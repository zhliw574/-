<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>流水明细</title>
    <style>
        body { font-family: Arial; background: #f0f2f5; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        td, th { border: 1px solid #ccc; padding: 8px; text-align: center; }
        th { background: #f5f5f5; }
        .back { margin-bottom: 10px; }
        a { color: #1890ff; text-decoration: none; }
        input { padding: 6px; margin-right: 5px; }
        button { padding: 6px 10px; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <div class="back"><a th:href="@{/user/home}">← 返回首页</a></div>
    <h3>类型：[[${type}]]</h3>

    <form th:action="@{/user/transaction/add}" method="post">
        <input type="hidden" name="type" th:value="${type}">
        金额：<input type="number" name="amount" required>
        日期：<input type="date" name="date" required>
        <button type="submit">添加</button>
    </form>

    <table>
        <tr>
            <th>ID</th>
            <th>金额</th>
            <th>日期</th>
            <th>操作</th>
        </tr>
        <tr th:each="tx : ${transactions}">
            <!-- 这里全部改成 transactionId，就这一处！-->
            <td th:text="${tx.transactionId}"></td>
            <td th:text="${tx.amount}"></td>
            <td th:text="${tx.date}"></td>
            <td>
                <button onclick="alert('暂未开放删除')">删除</button>
            </td>
        </tr>
    </table>
</div>
</body>
</html>
