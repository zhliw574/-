<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${typeName} + ' - 流水详情'"></title>
    <style>
        body { font-family: Arial; background: #f0f2f5; padding: 30px; }
        h2 { margin-bottom: 20px; }
        table { width: 100%; background: #fff; border-collapse: collapse; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
        th { background: #fafafa; }
        .btn { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .btn-del { background: #ff4d4f; color: #fff; }
        .btn-edit { background: #1890ff; color: #fff; }
        .back { margin-bottom: 15px; }
        .back a { color: #1890ff; }
        .add-form { background: #fff; padding: 15px; margin-bottom: 20px; border-radius: 8px; display: flex; gap: 10px; }
        .add-form input, .add-form select { padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .add-form button { padding: 8px 20px; background: #52c41a; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        .msg { color: green; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="back"><a th:href="@{/user/home}">← 返回首页</a></div>
<h2 th:text="${typeName} + ' 流水明细'"></h2>
<div th:if="${success}" class="msg" th:text="${success}"></div>
<form class="add-form" th:action="@{/user/transaction/add}" method="post">
    <input type="hidden" name="type" th:value="${typeName}">
    <input type="number" name="amount" placeholder="金额" step="0.01" required>
    <input type="date" name="date" required>
    <button type="submit">添加</button>
</form>
<table>
    <thead>
    <tr><th>流水ID</th><th>金额</th><th>日期</th><th>类型</th><th>操作</th></tr>
    </thead>
    <tbody>
    <tr th:each="tx : ${transactions}">
        <td th:text="${tx.transactionId}"></td>
        <td th:text="${tx.amount}"></td>
        <td th:text="${tx.date}"></td>
        <td th:text="${tx.type}"></td>
        <td>
            <a class="btn btn-del" th:href="@{/user/transaction/delete/{id}(id=${tx.transactionId})}" onclick="return confirm('确认删除？')">删除</a>
            <button class="btn btn-edit" onclick="editTx(this)" th:attr="data-id=${tx.transactionId},data-amount=${tx.amount},data-date=${tx.date}">修改</button>
        </td>
    </tr>
    </tbody>
</table>
<div id="editModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center;">
    <div style="background:#fff; padding:30px; border-radius:10px; width:350px;">
        <h3>修改流水</h3>
        <form th:action="@{/user/transaction/update}" method="post">
            <input type="hidden" name="transactionId" id="editId">
            <input type="number" name="amount" id="editAmount" placeholder="金额" step="0.01" required style="width:100%; padding:8px; margin-bottom:10px;">
            <input type="date" name="date" id="editDate" required style="width:100%; padding:8px; margin-bottom:10px;">
            <button type="submit" style="padding:8px 20px; background:#1890ff; color:#fff; border:none; border-radius:4px;">保存</button>
            <button type="button" onclick="closeEdit()" style="padding:8px 20px; margin-left:10px;">取消</button>
        </form>
    </div>
</div>
<script>
    function editTx(btn) {
        document.getElementById('editId').value = btn.dataset.id;
        document.getElementById('editAmount').value = btn.dataset.amount;
        document.getElementById('editDate').value = btn.dataset.date;
        document.getElementById('editModal').style.display = 'flex';
    }
    function closeEdit() { document.getElementById('editModal').style.display = 'none'; }
</script>
</body>
</html>
