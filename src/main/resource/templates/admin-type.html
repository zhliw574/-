<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>管理员 - 流水明细</title>
    <style>
        body {font-family:Arial;background:#f5f7fa;padding:20px;}
        .back {margin-bottom:15px;}
        .back a {color:#007bff;text-decoration:none;}
        
        .search-box {
            background:#fff; padding:15px; border-radius:8px; margin-bottom:15px;
            display:flex; gap:10px; align-items:center;
        }
        .search-box input {
            padding:8px; width:200px; border:1px solid #ddd; border-radius:4px;
        }
        .search-box button {
            padding:8px 16px; background:#007bff; color:#fff; border:none; border-radius:4px; cursor:pointer;
        }
        .search-box a {
            padding:8px 16px; background:#6c757d; color:#fff; border-radius:4px; text-decoration:none;
        }

        table {width:100%;background:#fff;border-collapse:collapse;margin:15px 0;}
        th,td {padding:10px;border:1px solid #eee;text-align:center;}
        th {background:#f8f9fa;}
        .btn {padding:5px 12px;border:none;border-radius:4px;color:#fff;font-size:13px;cursor:pointer;text-decoration:none;display:inline-block;min-width:60px;text-align:center;}
        .btn-del {background:#dc3545;}
        .btn-edit {background:#007bff;margin-left:5px;}
        .msg {color:green;margin:10px 0;}
        .err {color:red;}
        #editModalAdmin {display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;z-index:999;}
        .modal-content {background:#fff;padding:20px;border-radius:8px;width:320px;}
        .modal-content input {width:100%;margin:8px 0;padding:8px;border:1px solid #ddd;border-radius:4px;}
        .modal-btns {display:flex;gap:10px;margin-top:10px;}
        .modal-btns button {flex:1;padding:8px;border:none;border-radius:4px;cursor:pointer;}
    </style>
</head>
<body>
<div class="back"><a th:href="@{/admin/home}">← 返回管理员首页</a></div>
<h2>[[${type}]] 流水（管理员）</h2>

<div class="search-box">
    <form th:action="@{/admin/type/{type}(type=${type})}" method="get" style="display:flex; gap:10px;">
        <input type="number" name="userId" placeholder="请输入用户ID进行搜索" th:value="${userId}">
        <button type="submit">搜索</button>
        <a th:href="@{/admin/type/{type}(type=${type})}">重置</a>
    </form>
</div>

<div th:if="${success}" class="msg" th:text="${success}"></div>
<div th:if="${error}" class="msg err" th:text="${error}"></div>

<table>
    <thead>
        <tr><th>ID</th><th>用户ID</th><th>用户名</th><th>金额</th><th>日期</th><th>类型</th><th>操作</th></tr>
    </thead>
    <tbody>
        <tr th:each="t : ${transactions}">
            <td th:text="${t.transactionId}"></td>
            <td th:text="${t.user.userId}"></td>
            <td th:text="${t.user.username}"></td>
            <td th:text="${t.amount}"></td>
            <td th:text="${t.date}"></td>
            <td th:text="${t.type}"></td>
            <td>
                <a class="btn btn-del"
                   th:href="@{/admin/transaction/delete/{id}(id=${t.transactionId})}"
                   onclick="return confirm('确定删除？')">删除</a>

                <button class="btn btn-edit"
                        onclick="openEditAdmin(this)"
                        th:data-id="${t.transactionId}"
                        th:data-amount="${t.amount}"
                        th:data-date="${t.date}">修改</button>
            </td>
        </tr>
    </tbody>
</table>

<div id="editModalAdmin">
    <div class="modal-content">
        <h3>修改流水</h3>
        <form th:action="@{/admin/transaction/update}" method="post">
            <input type="hidden" name="transactionId" id="eida">
            <input type="number" name="amount" id="eamta" step="0.01" required placeholder="金额">
            <input type="date" name="date" id="edatea" required>
            <div class="modal-btns">
                <button type="submit" style="background:#007bff;color:#fff;">保存</button>
                <button type="button" onclick="closeEditAdmin()" style="background:#ccc;">取消</button>
            </div>
        </form>
    </div>
</div>

<script>
function openEditAdmin(btn){
    document.getElementById('eida').value=btn.dataset.id;
    document.getElementById('eamta').value=btn.dataset.amount;
    document.getElementById('edatea').value=btn.dataset.date;
    document.getElementById('editModalAdmin').style.display='flex';
}
function closeEditAdmin(){
    document.getElementById('editModalAdmin').style.display='none';
}
window.onclick=function(e){
    let m=document.getElementById('editModalAdmin');
    if(e.target===m)closeEditAdmin();
}
</script>
</body>
</html>
