<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>流水占比图</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial; background: #f0f2f5; padding: 30px; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 10px; }
        .back { margin-bottom: 15px; }
        .back a { color: #1890ff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="back"><a th:href="@{/user/home}">← 返回首页</a></div>
        <h2>本月流水占比</h2>
        <canvas id="pieChart"></canvas>
    </div>
    <script>
        const typeSum = {};
        typeSum['餐饮'] = [[${typeSum.餐饮 != null ? typeSum.餐饮 : 0}]];
        typeSum['水电'] = [[${typeSum.水电 != null ? typeSum.水电 : 0}]];
        typeSum['交通'] = [[${typeSum.交通 != null ? typeSum.交通 : 0}]];
        typeSum['生活用品'] = [[${typeSum.生活用品 != null ? typeSum.生活用品 : 0}]];
        typeSum['工资'] = [[${typeSum.工资 != null ? typeSum.工资 : 0}]];
        typeSum['其他'] = [[${typeSum.其他 != null ? typeSum.其他 : 0}]];
        const types = Object.keys(typeSum);
        const values = Object.values(typeSum);
        new Chart(document.getElementById('pieChart'), {
            type: 'pie',
            data: {
                labels: types,
                datasets: [{ data: values, backgroundColor: ['#f56a00','#7262fd','#00a2ae','#f5c400','#1890ff','#999'] }]
            }
        });
    </script>
</body>
</html>
