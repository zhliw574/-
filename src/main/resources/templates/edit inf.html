<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>管理员首页</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial; background: #f0f2f5; }
    .header { background: #1890ff; color: #fff; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
    .header a { color: #fff; margin-left: 15px; text-decoration: none; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 30px; max-width: 1000px; margin: 0 auto; }
    .card { background: #fff; padding: 25px; border-radius: 10px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-decoration:none; color:#333; }
    .card h3 { margin-bottom: 10px; }
    .amount { font-size: 22px; color: #1890ff; font-weight: bold; }
    .chart-btn { position: fixed; bottom: 30px; right: 30px; background: #52c41a; color: #fff; padding: 15px 25px; border-radius: 50px; text-decoration: none; }
  </style>
</head>
<body>
<div class="header">
  <span>管理员：[[${admin.adminName}]]</span>
  <div>
    <a href="/logout">退出登录</a>
  </div>
</div>

<div class="grid">
  <a th:href="@{/admin/type/餐饮}" class="card">
    <h3>🍽 餐饮</h3>
    <p class="amount">¥[[${餐饮Sum}]]</p>
  </a>
  <a th:href="@{/admin/type/水电}" class="card">
    <h3>💡 水电</h3>
    <p class="amount">¥[[${水电Sum}]]</p>
  </a>
  <a th:href="@{/admin/type/交通}" class="card">
    <h3>🚗 交通</h3>
    <p class="amount">¥[[${交通Sum}]]</p>
  </a>
  <a th:href="@{/admin/type/生活用品}" class="card">
    <h3>🛒 生活用品</h3>
    <p class="amount">¥[[${生活用品Sum}]]</p>
  </a>
  <a th:href="@{/admin/type/工资}" class="card">
    <h3>💰 工资</h3>
    <p class="amount">¥[[${工资Sum}]]</p>
  </a>
  <a th:href="@{/admin/type/其他}" class="card">
    <h3>📦 其他</h3>
    <p class="amount">¥[[${其他Sum}]]</p>
  </a>
</div>

<a th:href="@{/admin/chart}" class="chart-btn">📊 全平台占比图</a>
</body>
</html>
